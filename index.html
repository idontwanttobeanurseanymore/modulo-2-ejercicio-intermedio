<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock, paper, scissors</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>

<body>

  <header>
    <h1>Rock, paper, scissors</h1>
  </header>

  <main class="gameBox">

    <section class="game">
      <h2 class="js_h2"></h2>
      <div class="messagesBox js_messages_box collapsed">
        <p class="message js_message"></p>
        <p class="message cpu_message js_message_cpu"></p>
      </div>
      <div class="user_btn js_user_btn collapsed">
        <button class="btn js_btn_rock">Rock</button>
        <button class="btn js_btn_paper">Paper</button>
        <button class="btn js_btn_scissors">Scissors</button>
      </div>
      <button class="btn js_playBtn">Play</button>
      
      <div class="scoreboard js_scoreboard collapsed">
        <h2>Scoreboard</h2>
        <div class="scores">
          <p>Your points<span class="score js_player_score"></span></p>
          <p>My points<span class="score js_CPU_score"></span></p>
        </div>
      </div>
      <button class="btn js_replayBtn collapsed">Replay</button>
    </section>

  </main>

  <script src="./js/main.js"></script>

</body>

</html>
