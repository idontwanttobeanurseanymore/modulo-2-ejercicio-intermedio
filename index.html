<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pieda, pepel y tijera</title>

  <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>
    <main>
        <h1>Juego Piedra, Papel y Tijera</h1>
        <h2>Introduce aquí tu jugada:</h2>

            <div class="js_options">
            <form class="js_player_options">
                <label for="js_player_choice">
                    <select id="js_player_choice" name="js_player_choice" class="js_player_choice">
                        <option value="">Selecciona una opción</option>
                        <option value="1">Piedra</option>
                        <option value="2">Papel</option>
                        <option value="3">Tijeras</option>
                    </select>
                </label>

                <button class="js_playBtn">Jugar</button>
                <button class="js_replayBtn">Volver</button>
            </form>
            </div>
            <div class="js_scoreBoard">
                <p class="js_player_result">Tu elección: </p>
                <p class="js_CPU_result">Mi elección: </p>
                <p class="js_result_message"></p>
            </div>
        </form>
    </main>
</body>
