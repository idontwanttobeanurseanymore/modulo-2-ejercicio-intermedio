<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piedra, papel y tijeras</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>

<body>

  <header>
    <h1>Rock, paper, scissors</h1>
  </header>

  <main class="gameBox">

    <section class="game">
      <h2>Do you think you can win?</h2>
      <div class="user_btn js_user_btn collapsed">
        <button class="btn js_btn_rock" value="rock">Rock</button>
        <button class="btn js_btn_paper" value="paper">Paper</button>
        <button class="btn js_btn_scissors" value="scissors">Scissors</button>
      </div>
      <button class="btn js_playBtn">Play</button>
      <div class="results">
        <p class="message js_message_result"></p>
      </div>

      <div class="scoreboard collapsed js_scoreboard">
        <p class="">Scoreboard</p>
        <p class="score js_player_score"></p>
        <p class="score js_CPU_score"></p>
      </div>
      <button class="btn js_replayBtn collapsed">Replay</button>
    </section>

  </main>

  <script src="./js/main.js"></script>

</body>

</html>
