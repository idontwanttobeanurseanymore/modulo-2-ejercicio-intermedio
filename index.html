<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piedra, papel y tijeras</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <h1>Rock, paper, scissors</h1>
  </header>

  <main class="gameBox">

    <section class="game">
      <h2>Do you think you can win?</h2>
        <div class="js_options">
            <form class="js_player_options">
                <label for="js_player_choice">
                    <select id="js_player_choice" name="js_player_choice" class="js_player_choice">
                        <option value="">...</option>
                        <option value="rock">Rock</option>
                        <option value="paper">Paper</option>
                        <option value="scissors">Scissors</option>
                    </select>
                </label>
            </form>
        </div>
      <button class="btn js_playBtn">Play</button>
        <div class="results">
            <div class="choices">
                <p class="playerMessage js_player_result"></p>
                <p class="cpuMessage js_CPU_result"></p>
            </div>
            <p class="message js_message_result"></p>
        </div>
      
        <div class="scoreboard">
            <p class="scoreboard">Scoreboard</p>
            <p class="js_player_score"></p>
            <p class="js_CPU_score"></p>
        </div>
         <button class="btn js_replayBtn collapsed">Replay</button>
    </section>

  </main>

  <script src="./js/main.js"></script>

</body>
</html>
